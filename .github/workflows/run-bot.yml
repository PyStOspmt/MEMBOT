name: Run Telegram Bot

on:
  workflow_dispatch: # Дозволяє запускати вручну
  schedule:
    # Важливо: GitHub Actions має ліміт 6 годин на один запуск
    # Цей cron буде перезапускати бота кожні 6 годин
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
          YTDLP_PROXY: ${{ secrets.YTDLP_PROXY }}
        # Запускаємо бота (максимум до 6 годин, потім GitHub вб'є процес)
        run: python bot.py
